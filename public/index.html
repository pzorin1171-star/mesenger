<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="container">
        <h2>Добро пожаловать</h2>
        <div id="auth-tabs">
            <button id="login-tab" class="tab active">Вход</button>
            <button id="register-tab" class="tab">Регистрация</button>
        </div>
        <div id="login-form" class="auth-form active">
            <input type="text" id="login-username" placeholder="Имя пользователя">
            <input type="password" id="login-password" placeholder="Пароль">
            <button id="login-btn">Войти</button>
            <p id="login-error" class="error"></p>
        </div>
        <div id="register-form" class="auth-form">
            <input type="text" id="register-username" placeholder="Имя пользователя">
            <input type="password" id="register-password" placeholder="Пароль">
            <button id="register-btn">Зарегистрироваться</button>
            <p id="register-error" class="error"></p>
        </div>
    </div>

    <div id="chat-container" class="container" style="display: none;">
        <div id="messages"></div>
        <form id="message-form">
            <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
